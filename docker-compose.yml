version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: cabconnect-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cabconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: cabconnect-backend
    ports:
      - "5000:5000"
    env_file:
      - ./apps/backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ridehailing
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./apps/backend/src:/app/src
    restart: unless-stopped

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: cabconnect-admin
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_APP_NAME=CabConnect Admin
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
